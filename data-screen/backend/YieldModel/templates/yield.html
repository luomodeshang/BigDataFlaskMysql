<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>良率分析 - 智能贴合分析系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --accent-color: #e74c3c;
            --light-color: #ecf0f1;
            --dark-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: var(--dark-color);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
        }

        .yield-card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            background-color: white;
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .card-title {
            font-weight: 600;
            color: var(--secondary-color);
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--light-color);
        }

        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            padding: 0.5rem 1.5rem;
        }

        .btn-primary:hover {
            background-color: #2980b9;
            border-color: #2980b9;
        }

        .result-card {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 1.5rem;
            margin-top: 2rem;
        }

        .yield-gauge {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 2rem;
        }

        .gauge-bg {
            fill: none;
            stroke: var(--light-color);
            stroke-width: 10;
        }

        .gauge-fill {
            fill: none;
            stroke: var(--primary-color);
            stroke-width: 10;
            stroke-linecap: round;
            transform-origin: center;
            transform: rotate(-90deg);
            transition: stroke-dasharray 1s ease;
        }

        .gauge-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2rem;
            font-weight: 600;
            color: var(--secondary-color);
        }

        .stat-item {
            background-color: var(--light-color);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        .badge-high {
            background-color: var(--accent-color);
        }

        .table-container {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 1rem;
            margin-top: 2rem;
        }

        .error-message {
            color: var(--accent-color);
            font-weight: 500;
        }

        .loading-spinner {
            display: none;
            color: var(--primary-color);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-cpu"></i> 智能贴合分析系统
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="bi bi-house-door"></i> 首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/prediction"><i class="bi bi-graph-up"></i> 预测模型</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/yield"><i class="bi bi-percent"></i> 良率分析</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <div class="container my-5">
        <div class="row">
            <div class="col-lg-12">
                <div class="yield-card">
                    <h2 class="card-title"><i class="bi bi-percent me-2"></i>良率分析</h2>

                    <form id="yieldForm">
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label for="yieldBeginTime" class="form-label">开始时间</label>
                                <input type="datetime-local" class="form-control" id="yieldBeginTime" required>
                            </div>
                            <div class="col-md-6">
                                <label for="yieldEndTime" class="form-label">结束时间</label>
                                <input type="datetime-local" class="form-control" id="yieldEndTime" required>
                            </div>
                        </div>

                        <div class="d-flex justify-content-between align-items-center">
                            <button type="submit" class="btn btn-primary">
                                <span id="submitText">计算良率</span>
                                <div id="loadingSpinner" class="loading-spinner ms-2 spinner-border spinner-border-sm" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                            </button>

                            <div id="errorAlert" class="error-message" style="display: none;"></div>
                        </div>
                    </form>
                </div>

                <!-- 分析结果 -->
                <div id="resultSection" style="display: none;">
                    <div class="result-card">
                        <h3 class="mb-4"><i class="bi bi-clipboard-data me-2"></i>良率分析结果</h3>

                        <div class="row align-items-center">
                            <div class="col-md-4 text-center">
                                <div class="yield-gauge">
                                    <svg width="100%" height="100%" viewBox="0 0 100 100">
                                        <circle class="gauge-bg" cx="50" cy="50" r="45"></circle>
                                        <circle class="gauge-fill" cx="50" cy="50" r="45" id="gaugeFill"></circle>
                                    </svg>
                                    <div class="gauge-text" id="yieldRateText">0%</div>
                                </div>
                            </div>
                            <div class="col-md-8">
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="stat-item">
                                            <h5>总工件数量</h5>
                                            <p class="stat-value" id="totalCount">0</p>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="stat-item">
                                            <h5>误差>10的数量</h5>
                                            <p class="stat-value" id="highErrorCount">0</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 高误差数据表格 -->
                    <div class="table-container">
                        <h4 class="mb-3"><i class="bi bi-exclamation-triangle me-2"></i>高误差记录 (误差>10)</h4>
                        <div class="table-responsive">
                            <table class="table table-striped table-hover">
                                <thead class="table-dark">
                                    <tr>
                                        <th>ID</th>
                                        <th>贴合误差X</th>
                                        <th>贴合误差Y</th>
                                        <th>总误差</th>
                                        <th>状态</th>
                                    </tr>
                                </thead>
                                <tbody id="highErrorTable">
                                    <tr>
                                        <td colspan="5" class="text-center">没有找到高误差记录</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('yieldForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const beginTime = document.getElementById('yieldBeginTime').value;
            const endTime = document.getElementById('yieldEndTime').value;

            if (!beginTime || !endTime) {
                showError('请填写完整的时间范围');
                return;
            }

            // 显示加载状态
            document.getElementById('loadingSpinner').style.display = 'inline-block';
            document.getElementById('submitText').textContent = '计算中...';
            document.getElementById('errorAlert').style.display = 'none';

            const formattedBeginTime = formatDateTime(beginTime);
            const formattedEndTime = formatDateTime(endTime);

            fetch('/yield_model', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    begin_time: formattedBeginTime,
                    end_time: formattedEndTime
                })
            })
            .then(response => response.json())
            .then(data => {
                // 隐藏加载状态
                document.getElementById('loadingSpinner').style.display = 'none';
                document.getElementById('submitText').textContent = '计算良率';

                if (data.success) {
                    displayResults(data);
                } else {
                    showError(data.error || '良率计算过程中发生错误');
                }
            })
            .catch(error => {
                // 隐藏加载状态
                document.getElementById('loadingSpinner').style.display = 'none';
                document.getElementById('submitText').textContent = '计算良率';

                showError('请求失败: ' + error.message);
            });
        });

        function formatDateTime(datetimeStr) {
            const dt = new Date(datetimeStr);
            const pad = num => num.toString().padStart(2, '0');
            return `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())} ${pad(dt.getHours())}:${pad(dt.getMinutes())}:${pad(dt.getSeconds())}`;
        }

        function displayResults(data) {
            const stats = data.stats;
            const highErrorData = data.high_error_data;

            // 更新仪表盘
            const circumference = 2 * Math.PI * 45;
            const yieldRate = stats.yield_rate;
            const offset = circumference - (yieldRate / 100) * circumference;

            document.getElementById('gaugeFill').style.strokeDasharray = circumference;
            document.getElementById('gaugeFill').style.strokeDashoffset = offset;
            document.getElementById('yieldRateText').textContent = `${yieldRate}%`;

            // 更新统计信息
            document.getElementById('totalCount').textContent = stats.total_count;
            document.getElementById('highErrorCount').textContent = stats.high_error_count;

            // 更新高误差表格
            const tableBody = document.getElementById('highErrorTable');
            tableBody.innerHTML = '';

            if (highErrorData && highErrorData.length > 0) {
                highErrorData.forEach(item => {
                    const totalError = Math.sqrt(item['贴合误差X']**2 + item['贴合误差Y']**2).toFixed(2);
                    const row = document.createElement('tr');

                    row.innerHTML = `
                        <td>${item.ID || '-'}</td>
                        <td>${item['贴合误差X'].toFixed(2)}</td>
                        <td>${item['贴合误差Y'].toFixed(2)}</td>
                        <td>${totalError}</td>
                        <td><span class="badge badge-high bg-danger">高误差</span></td>
                    `;

                    tableBody.appendChild(row);
                });
            } else {
                tableBody.innerHTML = `
                    <tr>
                        <td colspan="5" class="text-center">没有找到高误差记录</td>
                    </tr>
                `;
            }

            // 显示结果区域
            document.getElementById('resultSection').style.display = 'block';
        }

        function showError(message) {
            const errorAlert = document.getElementById('errorAlert');
            errorAlert.textContent = message;
            errorAlert.style.display = 'block';
        }
    </script>
</body>
</html>
